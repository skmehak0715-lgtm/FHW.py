<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW16</title>

    <style>

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f0f4ff;
            text-align: center;
            padding: 30px;
        }

        h1 {
            color: #ff4d4d;
        }
        p {
            color: #444444;
        }

        button {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .card-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .hero-card {
            background-color: white;
            border: 3px solid #ff4d4d;
            border-radius: 12px;
            width: 220px;
            padding: 18px;
        }

        .hero-name {
            font-size: 22px;
            font-weight: bold;
            color: #222222;
        }

        .hero-power {
            color: #00057b8;
            font-weight: boly;
        }

        .hero-mission {
            color: #666666;
            font-size: 14px;
        }
    </style>
</head>
<body>
 
    <h1>my superhero power cards</h1>

    <p>
        click the button to create superhero objects using javascript classes. 
    </p>

    <button onclick="showheros()">show superheros</button>

    <div class="card-container" id="hero-cards"></div>

    <script>
        // what is a class?
        // a class is a blueprint used to create objects.

        class superhero {

            // constructor
            constructor (name, power, mission) {

                // the this keywork stores values inside the object
                this.name = name;
                this.power = power;
                this.mission = mission;
            }

            // class method
            describehero() {
                return "<div class='hero-card'>" +
                    "<p class='hero-name'>" +
                        this.name + "</p>" +
                        "<p class='heropower'>power: " + this.power"
            }
        }
    </script>
</body>
</html>
